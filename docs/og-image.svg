<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <circle cx="150" cy="150" r="180" fill="#1f6feb" fill-opacity="0.15" filter="url(#blur)"/>
  <circle cx="1050" cy="500" r="200" fill="#8957e5" fill-opacity="0.15" filter="url(#blur)"/>

  <g fill="#30363d" opacity="0.35">
    <rect x="0" y="0" width="1200" height="1"/>
    <rect x="0" y="629" width="1200" height="1"/>
    <path d="M 60 60 L 60 90 M 60 60 L 90 60" stroke="#30363d" stroke-width="2"/>
    <path d="M 1140 60 L 1140 90 M 1140 60 L 1110 60" stroke="#30363d" stroke-width="2"/>
    <path d="M 60 570 L 60 540 M 60 570 L 90 570" stroke="#30363d" stroke-width="2"/>
    <path d="M 1140 570 L 1140 540 M 1140 570 L 1110 570" stroke="#30363d" stroke-width="2"/>
  </g>

  <g transform="translate(80, 90)">
    <rect width="64" height="64" rx="14" fill="url(#accent)"/>
    <g fill="#fff">
      <rect x="16" y="20" width="32" height="24" rx="4"/>
      <circle cx="32" cy="14" r="3"/>
      <rect x="30.5" y="14" width="3" height="8"/>
      <rect x="12" y="28" width="4" height="8" rx="1.5"/>
      <rect x="48" y="28" width="4" height="8" rx="1.5"/>
    </g>
    <g fill="#0d1117">
      <circle cx="25" cy="30" r="3.2"/>
      <circle cx="39" cy="30" r="3.2"/>
      <rect x="24" y="37" width="16" height="2.5" rx="1"/>
    </g>
  </g>

  <text x="165" y="137" font-size="34" font-weight="500" fill="#8b949e" letter-spacing="3">AWESOME</text>
  <text x="80" y="225" font-size="88" font-weight="800" fill="#f0f6fc" letter-spacing="-2">AutoML</text>

  <rect x="80" y="260" width="80" height="4" fill="url(#accent)" rx="2"/>

  <text x="80" y="310" font-size="30" font-weight="400" fill="#c9d1d9">
    <tspan>250+ tools for automated machine learning</tspan>
  </text>
  <text x="80" y="348" font-size="22" font-weight="400" fill="#8b949e">
    <tspan>from HPO and NAS to autonomous AI agents</tspan>
  </text>

  <g transform="translate(80, 420)">
    <rect width="180" height="50" rx="25" fill="#21262d" stroke="#30363d"/>
    <circle cx="28" cy="25" r="6" fill="#3fb950"/>
    <text x="48" y="32" font-size="17" fill="#c9d1d9">AI-curated</text>

    <rect x="200" width="200" height="50" rx="25" fill="#21262d" stroke="#30363d"/>
    <text x="218" y="32" font-size="17" fill="#c9d1d9">🔄 Weekly refresh</text>

    <rect x="420" width="180" height="50" rx="25" fill="#21262d" stroke="#30363d"/>
    <text x="438" y="32" font-size="17" fill="#c9d1d9">📊 Live dashboard</text>
  </g>

  <g transform="translate(80, 560)" fill="#6e7681" font-size="18">
    <text>github.com/jbogocz/awesome-automl</text>
  </g>

  <g transform="translate(930, 240)" font-size="15" fill="#8b949e" text-anchor="end">
    <rect x="-190" y="-30" width="200" height="220" rx="12" fill="#161b22" stroke="#30363d"/>
    <text x="-10" y="0" font-weight="700" fill="#f0f6fc" font-size="14" text-anchor="end">24 CATEGORIES</text>
    <text x="-10" y="30" text-anchor="end">General-Purpose AutoML</text>
    <text x="-10" y="55" text-anchor="end">Foundation Models</text>
    <text x="-10" y="80" text-anchor="end">Fine-Tuning · Prompt Opt</text>
    <text x="-10" y="105" text-anchor="end">ML Engineering Agents</text>
    <text x="-10" y="130" text-anchor="end">NAS · HPO · Feature Eng</text>
    <text x="-10" y="155" text-anchor="end">MLOps · Monitoring · Safety</text>
    <text x="-10" y="180" text-anchor="end" fill="#58a6ff">+ 18 more</text>
  </g>
</svg>
