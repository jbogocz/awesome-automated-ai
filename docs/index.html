<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Awesome Automated AI/ML — Catalog</title>

<meta name="description" content="A curated catalog of 250+ tools for Automated AI/ML — hyperparameter optimization, NAS, AutoML, LLM agents, prompt optimization, MLOps. Filterable by trend, license, activity. Refreshed weekly.">
<meta name="keywords" content="awesome, automl, automated ai, automated ml, machine learning, neural architecture search, hyperparameter optimization, fine-tuning, prompt optimization, LLM, MLOps, AI agents, commercial AutoML">
<meta name="theme-color" content="#1a1c25" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f7f5f0" media="(prefers-color-scheme: light)">
<meta name="color-scheme" content="dark light">
<link rel="canonical" href="https://jbogocz.github.io/awesome-automated-ai/">

<link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="./assets/avatar-400.png">

<meta property="og:type" content="website">
<meta property="og:title" content="Awesome Automated AI/ML — Catalog">
<meta property="og:description" content="A curated catalog of 250+ tools for Automated AI/ML, refreshed weekly. Filter by trend, license, activity.">
<meta property="og:url" content="https://jbogocz.github.io/awesome-automated-ai/">
<meta property="og:image" content="https://jbogocz.github.io/awesome-automated-ai/assets/social-preview-1280x640.png">
<meta property="og:image:width" content="1280">
<meta property="og:image:height" content="640">
<meta property="og:site_name" content="Awesome Automated AI/ML">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Awesome Automated AI/ML — Catalog">
<meta name="twitter:description" content="A curated catalog of 250+ tools for Automated AI/ML, refreshed weekly.">
<meta name="twitter:image" content="https://jbogocz.github.io/awesome-automated-ai/assets/social-preview-1280x640.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style"
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap">
<link rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap">

<link rel="stylesheet" href="./styles.css">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "ItemList",
  "name": "Awesome Automated AI/ML",
  "description": "A curated catalog of tools for Automated AI/ML.",
  "url": "https://jbogocz.github.io/awesome-automated-ai/"
}
</script>

<script>
  // Theme bootstrap — runs before paint to avoid flash.
  (() => {
    const saved = localStorage.getItem('theme');
    if (saved === 'light' || saved === 'dark') {
      document.documentElement.dataset.theme = saved;
    }
  })();
</script>
</head>
<body>

<div class="app">

  <header class="topbar">
    <button class="menu-trigger icon-btn" type="button" id="menu-trigger" aria-label="Open navigation" aria-expanded="false" aria-controls="sidebar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
    </button>

    <a href="https://jbogocz.github.io/awesome-automated-ai/" class="brand" style="border:0;">
      <span class="brand__logo" aria-hidden="true">
        <img class="brand__logo-dark"  src="./assets/logo-dark.svg" alt="" width="28" height="28" decoding="async">
        <img class="brand__logo-light" src="./assets/logo.svg"      alt="" width="28" height="28" decoding="async">
      </span>
      <span class="brand__mark">Awesome AutoML</span>
      <span class="brand__sub" id="brand-sub">
        <span class="live-dot" id="freshness-dot" aria-hidden="true"></span>
        <span id="brand-sub-text">Catalog</span>
      </span>
    </a>

    <span class="topbar__spacer"></span>

    <button class="cmdk-trigger" type="button" id="cmdk-trigger" aria-label="Open command palette">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14" aria-hidden="true">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>
      </svg>
      <span>Search projects, jump to category…</span>
      <span class="cmdk-trigger__hint"><kbd>⌘</kbd>K</span>
    </button>

    <div class="topbar__actions">
      <button class="icon-btn" type="button" id="theme-toggle" aria-label="Toggle color theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" id="theme-icon" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
      <a class="icon-btn" href="https://github.com/jbogocz/awesome-automated-ai" target="_blank" rel="noopener" aria-label="View on GitHub" style="border:0;">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 .3a12 12 0 0 0-3.8 23.38c.6.11.82-.26.82-.58v-2.1c-3.34.72-4.04-1.6-4.04-1.6-.55-1.4-1.34-1.77-1.34-1.77-1.09-.74.08-.72.08-.72 1.21.08 1.85 1.24 1.85 1.24 1.08 1.84 2.82 1.31 3.5 1 .11-.78.42-1.31.77-1.61-2.67-.3-5.47-1.34-5.47-5.96 0-1.32.47-2.4 1.24-3.24-.12-.31-.54-1.54.12-3.2 0 0 1-.32 3.3 1.23a11.4 11.4 0 0 1 6 0c2.3-1.55 3.3-1.23 3.3-1.23.66 1.66.24 2.89.12 3.2.77.84 1.24 1.92 1.24 3.24 0 4.63-2.81 5.65-5.48 5.95.43.37.81 1.1.81 2.22v3.29c0 .33.22.7.83.58A12 12 0 0 0 12 .3"/></svg>
      </a>
    </div>
  </header>

  <nav class="side" id="sidebar" aria-label="Categories">
    <button class="cat" type="button" id="cat-all" aria-pressed="true">
      <span>All projects</span>
      <span class="cat__count" id="cat-all-count">—</span>
    </button>
    <div class="side__divider"></div>
    <div id="section-groups"></div>
    <div class="side__divider"></div>
    <h3 class="side__title">About</h3>
    <p class="side__about">
      <strong>Frontier catalog</strong> for Automated AI/ML.
      Curated and refreshed <strong>weekly</strong> by an AI pipeline
      that scans GitHub for activity, novelty, and signal.
    </p>
  </nav>

  <main class="main">

    <!-- Lenses: one-click curated views. Each answers a specific question. -->
    <div class="lensbar" role="toolbar" aria-label="Lenses">
      <div class="lensbar__row">
        <button class="lens" type="button" data-lens="all"      aria-pressed="true"  title="Every tool in the catalog">All <span class="lens__count" data-count="all">—</span></button>
        <button class="lens" type="button" data-lens="top"      aria-pressed="false" title="Highest composite score, still maintained">Top picks <span class="lens__count" data-count="top">—</span></button>
        <button class="lens" type="button" data-lens="trending" aria-pressed="false" title="200+ stars gained in the last 30 days">Trending <span class="lens__count" data-count="trending">—</span></button>
        <button class="lens" type="button" data-lens="gems"     aria-pressed="false" title="High score but under 5k stars — under the radar">Hidden gems <span class="lens__count" data-count="gems">—</span></button>
      </div>
      <p class="lensbar__caption" id="lens-caption">All tools in the catalog. Sorted by composite quality score.</p>
    </div>

    <div class="filterbar" role="toolbar" aria-label="Filters">
      <button class="chip" type="button" data-filter="alive" aria-pressed="false">
        <span>● Alive</span>
        <span class="chip__count" id="chip-alive-count">—</span>
      </button>
      <button class="chip" type="button" data-filter="commercial" aria-pressed="false">
        <span>Commercial</span>
      </button>
      <button class="chip" type="button" data-filter="oss" aria-pressed="false">
        <span>Open source</span>
      </button>
      <button class="chip" type="button" data-filter="archived" aria-pressed="false">
        <span>Show archived</span>
      </button>

      <div class="filterbar__sep" aria-hidden="true"></div>

      <div class="sort-group" role="radiogroup" aria-label="Sort">
        <button class="sort-btn" type="button" data-sort="score"  aria-pressed="true"  title="Composite quality score">Score</button>
        <button class="sort-btn" type="button" data-sort="stars"  aria-pressed="false" title="GitHub star count">Stars</button>
        <button class="sort-btn" type="button" data-sort="trend"  aria-pressed="false" title="Most stars gained in the last 30 days">Trend</button>
        <button class="sort-btn" type="button" data-sort="recent" aria-pressed="false" title="Most recent commit first">Updated</button>
        <button class="sort-btn" type="button" data-sort="name"   aria-pressed="false" title="Alphabetical">A→Z</button>
      </div>

      <span class="filterbar__count" id="result-count">loading…</span>
    </div>

    <div class="stream" id="stream" role="list">
      <div class="loading-skeleton" style="width: 60%;"></div>
      <div class="loading-skeleton" style="width: 80%;"></div>
      <div class="loading-skeleton" style="width: 70%;"></div>
      <div class="loading-skeleton" style="width: 75%;"></div>
      <div class="loading-skeleton" style="width: 65%;"></div>
    </div>
  </main>

</div>

<!-- Detail sheet -->
<aside class="sheet" id="sheet" aria-label="Project details" aria-hidden="true">
  <div class="sheet__head">
    <h2 class="sheet__title" id="sheet-title">—</h2>
    <button class="sheet__close" type="button" id="sheet-close" aria-label="Close details">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="sheet__body" id="sheet-body">
    <!-- populated by JS -->
  </div>
</aside>

<div class="scrim" id="scrim" aria-hidden="true"></div>

<!-- Command palette -->
<div class="cmdk" id="cmdk" role="dialog" aria-modal="true" aria-label="Command palette" aria-hidden="true">
  <input class="cmdk__input" type="text" id="cmdk-input" placeholder="Search projects · jump to category · type ? for help" autocomplete="off" spellcheck="false">
  <div class="cmdk__list" id="cmdk-list"></div>
  <div class="cmdk__foot">
    <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
    <span><kbd>↵</kbd> open</span>
    <span><kbd>esc</kbd> close</span>
    <span id="cmdk-freshness" style="margin-left:auto;font-family:var(--font-mono);"></span>
  </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>
