categories:
- name: General-Purpose AutoML
  description: End-to-end frameworks that automate model selection, hyperparameter tuning, and pipeline construction. Covers both open-source libraries and enterprise commercial platforms.
  entries:
  - name: Ludwig
    repo: ludwig-ai/ludwig
    description: Declarative deep learning framework supporting custom model building and LLM fine-tuning via YAML configs. Now under Linux Foundation AI & Data.
    tagline: Declarative deep learning via YAML configs
    tags: [computer-vision, data-centric, data-science, deep, deep-learning, deeplearning, fine-tuning, learning, llama, llama2, llm, llm-training, machine-learning, machinelearning, mistral, ml, natural-language, natural-language-processing, neural-network, pytorch]
  - name: AutoGluon
    repo: autogluon/autogluon
    description: Multi-layer stack ensembling for tabular, text, image, time-series, and multimodal data - won medals in 15/18 Kaggle tabular contests in 2024 (Amazon).
    tagline: Multi-modal stack ensembling, Kaggle champion
    tags: [autogluon, automated-machine-learning, automl, computer-vision, data-science, deep-learning, ensemble-learning, forecasting, gluon, hyperparameter-optimization, machine-learning, natural-language-processing, object-detection, python, pytorch, scikit-learn, structured-data, tabular-data, time-series, transfer-learning]
  - name: TPOT
    repo: EpistasisLab/tpot
    description: Genetic programming-based pipeline optimizer that designs and optimizes scikit-learn pipelines.
    tagline: Genetic programming pipeline optimizer for sklearn
    tags: [adsp, ag066833, aiml, alzheimer, alzheimers, automated-machine-learning, automation, automl, data-science, feature-engineering, gradient-boosting, hyperparameter-optimization, machine-learning, model-selection, nia, parameter-tuning, python, random-forest, scikit-learn, u01ag066833]
  - name: PyCaret
    repo: pycaret/pycaret
    description: Low-code machine learning library that automates model training, tuning, and deployment workflows in Python.
    tagline: Low-code AutoML from training to deployment
    tags: [anomaly-detection, citizen-data-scientists, classification, clustering, data-science, gpu, machine-learning, ml, pycaret, python, regression, time-series]
  - name: AutoKeras
    repo: keras-team/autokeras
    description: Neural architecture search for deep learning models built on top of Keras.
    tagline: Neural architecture search built on Keras
    tags: [autodl, automated-machine-learning, automl, deep-learning, keras, machine-learning, neural-architecture-search, python, tensorflow]
  - name: auto-sklearn
    repo: automl/auto-sklearn
    description: Historically important AutoML toolkit using Bayesian optimization, meta-learning, and ensemble construction.
    tagline: Bayesian optimization and meta-learning AutoML
    note: Low activity; no major releases since 2022.
    tags: [automated-machine-learning, automl, bayesian-optimization, hyperparameter-optimization, hyperparameter-search, hyperparameter-tuning, meta-learning, metalearning, scikit-learn, smac]
  - name: H2O AutoML
    repo: h2oai/h2o-3
    description: Distributed machine learning platform with automatic training and tuning of many models within a user-specified time limit.
    tagline: Enterprise distributed AutoML with time limits
    tags: [automl, big-data, data-science, deep-learning, distributed, ensemble-learning, gbm, gpu, h2o, h2o-automl, hadoop, java, machine-learning, naive-bayes, opensource, pca, python, r, random-forest, spark]
  - name: FLAML
    repo: microsoft/FLAML
    description: Fast and lightweight AutoML that finds good models with minimal resources - often the best choice for resource-constrained environments (Microsoft).
    tagline: Fast AutoML with minimal compute resources
    tags: [automated-machine-learning, automl, classification, data-science, deep-learning, finetuning, hyperparam, hyperparameter-optimization, jupyter-notebook, machine-learning, natural-language-generation, natural-language-processing, python, random-forest, regression, scikit-learn, tabular-data, timeseries-forecasting, tuning]
  - name: LazyPredict
    repo: shankarpandala/lazypredict
    description: Build and evaluate dozens of scikit-learn models in a single line of code for rapid baseline comparison.
    tagline: Dozens of sklearn models in one line
    tags: [automl, classification, machine-learning, regression]
  - name: MLJAR Supervised
    repo: mljar/mljar-supervised
    description: Automated ML with automatic explanations, visualizations, and Markdown reports for every trained model.
    tagline: AutoML with per-model reports and explanations
    tags: [automated-machine-learning, automl, automl-api, automl-python, catboost, data-science, decision-tree, ensemble, feature-engineering, hyper-parameters, hyperparameter-optimization, lightgbm, machine-learning, mljar, neural-network, random-forest, scikit-learn, xgboost]
  - name: LightAutoML
    repo: sb-ai-lab/LightAutoML
    description: Fast and customizable AutoML framework with Kaggle-winning performance (Sber AI Lab).
    tagline: Fast customizable AutoML with Kaggle wins
    tags: [automated-machine-learning, automatic-machine-learning, automl, automl-algorithms, binary-classification, data-science, kaggle, lama, machine-learning, multiclass-classification, nlp, python, regression]
  - name: EvalML
    repo: alteryx/evalml
    description: AutoML library for building, optimizing, and evaluating ML pipelines with domain-specific objectives (Alteryx).
    tagline: AutoML pipelines with domain-specific objectives
    tags: [automl, data-science, feature-engineering, feature-selection, hyperparameter-tuning, machine-learning, model-selection, optimization]
  - name: SapientML
    repo: sapientml/sapientml
    description: Generative AutoML that synthesizes pipelines by learning from a corpus of existing ML solutions.
    tagline: Generative AutoML from corpus of ML solutions
    tags: [automated-machine-learning, automl, automl-products, automl-python, machine-learning, python]
  - name: Auto-WEKA
    repo: automl/autoweka
    description: The original AutoML system (2013) combining algorithm selection and HPO in WEKA.
    tagline: Original AutoML combining algorithm selection and HPO
    note: Historical; Java-only, no commits since 2022.
    tags: [automl, bayesian-optimization, hyperparameter-optimization, java, machine-learning, model-selection, weka]
  - name: GAMA
    repo: amore-labs/gama
    description: AutoML tool that generates optimized ML pipelines using genetic programming and Bayesian optimization (OpenML).
    tagline: Genetic programming and Bayesian pipeline optimization
    tags: [automl, hyperparameter-optimization, research-tool]
  - name: Vertex AI AutoML
    url: https://cloud.google.com/vertex-ai
    description: Google Cloud's managed AutoML service for training tabular classification, regression, forecasting, image, and video models with one-click endpoint deployment.
    tagline: Managed AutoML across data types on Google Cloud
    vendor: Google
    pricing: pay-as-you-go
    commercial: true
  - name: Azure Machine Learning AutoML
    url: https://azure.microsoft.com/en-us/solutions/automated-machine-learning
    description: Microsoft's automated ML service inside Azure ML workspaces covering classification, regression, forecasting, computer vision, and NLP, accessible via SDK v2, CLI v2, and the studio UI.
    tagline: Automated ML inside Azure Machine Learning workspaces
    vendor: Microsoft
    pricing: pay-as-you-go
    commercial: true
  - name: Amazon SageMaker Autopilot
    url: https://aws.amazon.com/sagemaker/ai/autopilot/
    description: AWS AutoML service that runs feature engineering, algorithm selection, and tuning for tabular, text, image, and time-series tasks, now surfaced primarily through the SageMaker Canvas no-code UI and the AutoML v2 REST API.
    tagline: AWS AutoML via SageMaker Canvas and API v2
    vendor: Amazon Web Services
    pricing: pay-as-you-go
    commercial: true
  - name: H2O Driverless AI
    url: https://h2o.ai/platform/ai-cloud/make/h2o-driverless-ai/
    description: H2O.ai's commercial AutoML platform that automates feature engineering, model tuning, interpretability, and deployment for tabular, time-series, image, and text data, deployable on-prem, in cloud, or hybrid.
    tagline: Commercial AutoML with feature engineering and interpretability
    vendor: H2O.ai
    pricing: enterprise
    commercial: true
  - name: DataRobot
    url: https://www.datarobot.com/
    description: Enterprise AI platform for building, deploying, governing, and monitoring predictive, generative, and agentic models, with AutoML, MLOps, and compute orchestration expanded via the 2025 Agnostiq acquisition.
    tagline: Enterprise platform for predictive, generative, and agentic AI
    vendor: DataRobot
    pricing: enterprise
    commercial: true
  - name: Databricks AutoML
    url: https://docs.databricks.com/aws/en/machine-learning/automl/
    description: AutoML capability in the Databricks Lakehouse for regression, classification, and forecasting that trains multiple models with scikit-learn, XGBoost, LightGBM, Prophet, and ARIMA and generates editable training notebooks.
    tagline: Lakehouse AutoML producing editable training notebooks
    vendor: Databricks
    pricing: enterprise
    commercial: true
  - name: Dataiku Visual ML
    url: https://www.dataiku.com/product/key-capabilities/machine-learning/automl/
    description: AutoML and visual ML inside the Dataiku data platform covering classification, regression, forecasting, unsupervised learning, image classification, and object detection, with automated diagnostics, fairness analysis, and MLOps integration.
    tagline: Visual AutoML inside the Dataiku data platform
    vendor: Dataiku
    pricing: enterprise
    commercial: true
  - name: Snowflake Cortex ML Functions
    url: https://www.snowflake.com/en/product/features/cortex/
    description: SQL-accessible ML functions in Snowflake Cortex that train and serve forecasting, classification, and anomaly-detection models directly on warehouse data without moving it, complemented by the Cortex Code agent for data-science workflows.
    tagline: SQL-native ML and forecasting on Snowflake data
    vendor: Snowflake
    pricing: pay-as-you-go
    commercial: true
- name: Neural Architecture Search
  description: Automated search for optimal neural network architectures using reinforcement learning, evolution, gradient-based methods, or LLM-guided search.
  entries:
  - name: NNI
    repo: microsoft/nni
    description: Comprehensive AutoML toolkit for NAS, hyperparameter tuning, feature engineering, and model compression.
    tagline: Comprehensive NAS, HPO, and model compression toolkit
    note: Archived by Microsoft in Sep 2024.
    tags: [automated-machine-learning, automl, bayesian-optimization, data-science, deep-learning, deep-neural-network, distributed, feature-engineering, hyperparameter-optimization, hyperparameter-tuning, machine-learning, machine-learning-algorithms, mlops, model-compression, nas, neural-architecture-search, neural-network, python, pytorch, tensorflow]
  - name: Google AutoML
    repo: google/automl
    description: Research code for EfficientNet, EfficientDet, MnasNet, and other NAS-discovered architectures (Google Brain).
    tagline: Research code behind EfficientNet and EfficientDet
    note: Research code; sporadic updates.
    tags: [automl, efficientdet, efficientnet, efficientnetv2, object-detection]
  - name: TinyEngine
    repo: mit-han-lab/tinyengine
    description: Memory-efficient inference engine for NAS-optimized models on microcontrollers (MIT HAN Lab).
    tagline: Inference engine for NAS models on microcontrollers
    tags: [c, codegenerator, cpp, deep-learning, edge-computing, microcontroller, neural-architecture-search, pytorch, quantization, tinyml]
  - name: NASLib
    repo: automl/NASLib
    description: NAS research library from AutoML Freiburg with interfaces to state-of-the-art search spaces and optimizers.
    tagline: NAS research library with standardized search spaces
    tags: [automl, nas, neural-architecture-search]
  - name: Archai
    repo: microsoft/archai
    description: Modular NAS framework for reproducible architecture search research (Microsoft).
    tagline: Modular NAS framework for reproducible research
    tags: [automated-machine-learning, automl, darts, deep-learning, hyperparameter-optimization, machine-learning, model-compression, nas, neural-architecture-search, petridish, python, pytorch]
  - name: AutoPyTorch
    repo: automl/Auto-PyTorch
    description: Joint NAS and HPO for PyTorch from the AutoML Freiburg group behind auto-sklearn, combining BOHB with meta-learning and portfolio selection.
    tagline: Joint NAS and HPO for PyTorch from Auto-sklearn team
    note: Low activity since Apr 2024.
    tags: [automated-machine-learning, automl, deep-learning, hyperparameter-optimization, neural-architecture-search, pytorch]
- name: Hyperparameter Optimization
  description: Libraries dedicated to finding optimal hyperparameters via Bayesian optimization, bandits, evolutionary search, or population-based training.
  entries:
  - name: Ray Tune
    repo: ray-project/ray
    url: https://docs.ray.io/en/latest/tune/
    description: Distributed hyperparameter tuning at scale with support for any ML framework and many search algorithms.
    tagline: Distributed HPO at scale for any ML framework
    tags: [distributed, hyperparameter-optimization, hyperparameter-search, machine-learning, optimization, parallel, python, ray]
  - name: Optuna
    repo: optuna/optuna
    description: Define-by-run API with pruning, distributed execution, and a dashboard - the most widely adopted HPO framework.
    tagline: Most widely adopted HPO framework with pruning
    tags: [distributed, hyperparameter-optimization, machine-learning, parallel, python]
  - name: Hyperopt
    repo: hyperopt/hyperopt
    description: Pioneered tree-structured Parzen estimators for HPO.
    tagline: Pioneer of tree-structured Parzen estimators for HPO
    note: Maintenance-only since 2021 - Optuna is successor.
    tags: [hacktoberfest]
  - name: BoTorch
    repo: meta-pytorch/botorch
    description: Bayesian optimization library in PyTorch for high-dimensional, noisy, and multi-objective problems (Meta).
    tagline: PyTorch Bayesian optimization for multi-objective problems
    tags: [bayesian-optimization, deep-learning, gaussian-processes, hyperparameter-optimization, meta, python, pytorch]
  - name: Keras Tuner
    repo: keras-team/keras-tuner
    description: Hyperparameter search for Keras models with built-in Bayesian optimization and Hyperband.
    tagline: Hyperparameter search for Keras with Bayesian and Hyperband
    tags: [automl, deep-learning, hyperparameter-optimization, keras, machine-learning, tensorflow]
  - name: Ax
    repo: facebook/Ax
    description: Adaptive experimentation platform for multi-objective optimization with BoTorch integration (Meta).
    tagline: Adaptive experimentation for multi-objective optimization
    tags: [bayesian-optimization, experimentation, facebook, hyperparameter-optimization, machine-learning, meta, python, pytorch]
  - name: SMAC3
    repo: automl/SMAC3
    description: Sequential model-based algorithm configuration combining Bayesian optimization with racing mechanisms (AutoML Freiburg).
    tagline: Bayesian HPO with racing mechanisms for algorithm configuration
    tags: [algorithm-configuration, automated-machine-learning, automl, bayesian-optimisation, bayesian-optimization, configuration, gaussian-process, hyperparameter-optimization, hyperparameter-search, hyperparameter-tuning, random-forest]
  - name: Google Vizier
    repo: google/vizier
    description: Research interface for blackbox and hyperparameter optimization with Bayesian, evolutionary, and multi-objective algorithms based on Google's internal Vizier Service.
    tagline: Open-source interface to Google's internal HPO service
    tags: [algorithm, bayesian-optimization, blackbox-optimization, deep-learning, distributed-computing, distributed-systems, evolutionary-algorithms, google, grpc, hyperparameter-optimization, hyperparameter-tuning, machine-learning, open-source, optimization, tuning, tuning-parameters, vizier]
  - name: Nevergrad
    repo: facebookresearch/nevergrad
    description: Gradient-free optimization toolbox with CMA-ES, differential evolution, and particle swarm - Meta's canonical library for black-box and evolutionary optimization.
    tagline: Gradient-free optimization with CMA-ES and evolution
    tags: [bayesian-optimization, blackbox-optimization, evolutionary-algorithms, gradient-free-optimization, hyperparameter-optimization]
  - name: Katib
    repo: kubeflow/katib
    description: Kubernetes-native hyperparameter tuning and NAS with pluggable algorithms and parallel trials - the HPO layer of Kubeflow.
    tagline: Kubernetes-native HPO and NAS for Kubeflow
    tags: [hyperparameter-optimization, katib, kubeflow, kubernetes, machine-learning, neural-architecture-search]
- name: Automated Feature Engineering
  description: Tools that generate, select, and transform features without manual hand-crafting, including LLM-driven feature synthesis for tabular data.
  entries:
  - name: tsfresh
    repo: blue-yonder/tsfresh
    description: Automatic extraction of hundreds of time-series features with built-in statistical relevance filtering.
    tagline: Auto-extract hundreds of time-series features with filtering
    tags: [data-science, feature-extraction, time-series]
  - name: Featuretools
    repo: alteryx/featuretools
    description: Deep feature synthesis for automatically creating meaningful features from relational and temporal data (Alteryx).
    tagline: Deep feature synthesis for relational and temporal data
    tags: [automated-feature-engineering, automated-machine-learning, automl, data-science, feature-engineering, machine-learning, python, scikit-learn]
  - name: OpenMLDB
    repo: 4paradigm/OpenMLDB
    description: Database for consistent feature computation between training and serving with SQL-based feature engineering (SIGMOD 2025).
    tagline: SQL-based feature engineering consistent across train and serve
    tags: [database-for-ai, database-for-machine-learning, feature-engineering, feature-extraction, feature-store, featureops, featurestore, in-memory-database, machine-learning, machine-learning-database, mlops]
  - name: Boruta
    repo: scikit-learn-contrib/boruta_py
    description: All-relevant feature selection wrapper using random forest shadow features to identify important predictors.
    tagline: All-relevant feature selection via random forest shadows
    tags: [feature-engineering, feature-selection, machine-learning, python, random-forest, scikit-learn, tabular-data]
  - name: AutoFeat
    repo: cod3licious/autofeat
    description: Scikit-learn-compatible automated feature engineering and selection that generates non-linear features and selects robust subsets.
    tagline: Sklearn-compatible non-linear feature generation and selection
    tags: [automated-data-science, automated-feature-engineering, automated-machine-learning, automl, feature-engineering, feature-selection, linear-regression, machine-learning, machine-learning-models]
  - name: CAAFE
    repo: noahho/CAAFE
    description: LLM-powered context-aware feature engineering that generates semantically meaningful features with explanations.
    tagline: LLM generates semantically meaningful features with explanations
    tags: [automl, data-science, deep-learning, feature-engineering, machine-learning, tabpfn]
  - name: Feature-engine
    repo: feature-engine/feature_engine
    description: Scikit-learn-compatible transformers for feature creation, selection, encoding, and imputation.
    tagline: Sklearn transformers for feature creation and selection
    tags: [data-science, feature-engineering, feature-extraction, feature-selection, machine-learning, python, scikit-learn]
  - name: NVTabular
    repo: NVIDIA-Merlin/NVTabular
    description: GPU-accelerated feature engineering and preprocessing for terabyte-scale tabular data with automatic hashing, categorification, and normalization (NVIDIA).
    tagline: GPU-accelerated feature engineering for terabyte tabular data
    tags: [deep-learning, feature-engineering, feature-selection, gpu, machine-learning, nvidia, preprocessing, recommendation-system, recommender-system]
- name: Tabular Foundation Models
  description: Pretrained models that replace traditional tabular AutoML pipelines with a single forward pass or zero-shot inference on structured data.
  entries:
  - name: TabPFN
    repo: PriorLabs/TabPFN
    description: Tabular foundation model that matches tuned XGBoost in 2.8 seconds with a single forward pass - 100% win rate vs default XGBoost on datasets under 10K rows (Nature 2024, now v2.6 supporting up to 100K rows).
    tagline: Beats tuned XGBoost in 2.8 seconds flat
    tags: [data-science, foundation-models, machine-learning, tabpfn, tabular-data]
  - name: TabM
    repo: yandex-research/tabm
    description: Parameter-efficient ensemble of MLPs based on BatchEnsemble, achieving top performance among tabular deep learning models without attention complexity (ICLR 2025, Yandex).
    tagline: Efficient MLP ensemble for top tabular performance
    tags: [deep-learning, ensembling, machine-learning, neural-networks, python, pytorch, tabular-data]
  - name: TALENT
    repo: LAMDA-Tabular/TALENT
    description: Comprehensive toolkit and benchmark for tabular learning covering 35+ deep methods across 300 datasets.
    tagline: Benchmark toolkit for 35+ tabular deep methods
    tags: [tabular, tabular-data, tabular-data-benchmark, tabular-data-deep-learning, tabular-data-machine-learning, tabular-data-toolkit, tabular-methods]
  - name: TabICL
    repo: soda-inria/tabicl
    description: State-of-the-art tabular foundation model achieving 10x faster inference than TabPFN v2.5 (ICML 2025).
    tagline: Tabular foundation model 10x faster than TabPFN
    tags: [deep-learning, foundation-models, machine-learning, tabular-data, tabular-methods, tabular-model]
  - name: CARTE
    repo: soda-inria/carte
    description: Context-aware tabular representation using pretrained language models for data with heterogeneous columns.
    tagline: LLM-powered representation for heterogeneous tabular data
    tags: [classification, data-science, graph-transformer, machine-learning, regression, transformers]
  - name: LimiX
    repo: limix-ldm-ai/LimiX
    description: Structured-data foundation model that jointly models variables and missingness via a Latent Distribution Model, introducing LDM scaling laws for tabular data.
    tagline: Joint variable + missingness modeling with LDM scaling laws
    tags: [foundation-models, machine-learning, structured-data, tabular-data]
  - name: ConTextTab
    repo: SAP-samples/sap-rpt-1-oss
    description: Semantics-aware tabular in-context learner (SAP-RPT-1) trained on real-world tabular data rather than purely synthetic priors.
    tagline: Semantics-aware ICL trained on real tables
    tags: [deep-learning, foundation-models, in-context-learning, tabular-data]
  - name: TabDPT
    repo: layer6ai-labs/TabDPT-inference
    description: Scales tabular foundation models via pretraining on real data; inference code from "TabDPT, Scaling Tabular Foundation Models on Real Data" (Layer 6 AI).
    tagline: Scaling tabular foundation models on real data
    tags: [deep-learning, foundation-models, machine-learning, pretraining, tabular-data]
- name: AutoML Benchmarks
  description: Standardised benchmarks and evaluation harnesses for comparing AutoML systems and ML agents across tasks and datasets.
  entries:
  - name: MLE-Bench
    repo: openai/mle-bench
    description: Benchmark using 75 Kaggle competitions to evaluate ML engineering agents (OpenAI).
    tagline: 75 Kaggle competitions for evaluating ML agents
    tags: [agents, automl-benchmark, benchmark, evaluation, kaggle, llm, machine-learning, ml-engineering, openai, python]
  - name: NAS-Bench-101
    repo: google-research/nasbench
    description: Benchmark dataset with 423,624 evaluated neural architectures for efficient NAS research (Google).
    tagline: 423,624 evaluated neural architectures for NAS research
    note: Archived; reference benchmark, use NAS-Bench-201 for new work.
    tags: [automl, benchmark, dataset, deep-learning, google, neural-architecture-search, python, tensorflow]
  - name: NAS-Bench-201
    repo: D-X-Y/NAS-Bench-201
    description: Reproducible benchmark with 15,625 evaluated architectures across three datasets for fair NAS comparison.
    tagline: 15,625 architectures across three datasets for fair NAS
    tags: [automl, dataset, nas, nas-bench-201, pytorch]
  - name: AMLB
    repo: openml/automlbenchmark
    description: Standard AutoML benchmark comparing frameworks across 104 classification and regression tasks (OpenML).
    tagline: Standard benchmark comparing AutoML frameworks across 104 tasks
    tags: [automl, benchmark, machine-learning]
  - name: TabArena
    repo: autogluon/tabarena
    description: Living benchmark for tabular ML with continuously maintained leaderboard and best-practice evaluation (NeurIPS 2025 Spotlight).
    tagline: Living leaderboard for tabular ML best practices
    tags: [autogluon, automl, benchmark, machine-learning, python, tabular-data]
- name: Automated Fine-Tuning
  description: Tools that automate adapting large language models to specific tasks and domains via SFT, LoRA, QLoRA, DPO, RLHF, and related methods.
  entries:
  - name: LLaMA-Factory
    repo: hiyouga/LlamaFactory
    description: Unified fine-tuning framework for 100+ LLMs and VLMs with Full, LoRA, QLoRA, and DoRA methods plus web UI (ACL 2024).
    tagline: Unified fine-tuning for 100+ LLMs with web UI
    tags: [agent, ai, deepseek, fine-tuning, gemma, gpt, instruction-tuning, large-language-models, llama, llama3, llm, lora, moe, nlp, peft, qlora, quantization, qwen, rlhf, transformers]
  - name: Unsloth
    repo: unslothai/unsloth
    description: Fine-tune LLMs 2-5x faster with 80% less memory on a single GPU through optimized kernels and custom autograd.
    tagline: Fine-tune LLMs 2-5x faster, 80% less memory
    tags: [agent, deepseek, fine-tuning, gemma, gemma3, gpt-oss, llama, llama3, llm, llms, mistral, openai, qwen, reinforcement-learning, self-hosted, text-to-speech, tts, ui, unsloth]
  - name: PEFT
    repo: huggingface/peft
    description: Standard library for parameter-efficient fine-tuning - LoRA, QLoRA, Spectrum, and more. Deeply integrated with the Hugging Face ecosystem.
    tagline: Standard LoRA and parameter-efficient fine-tuning library
    tags: [adapter, diffusion, fine-tuning, llm, lora, parameter-efficient-learning, peft, python, pytorch, transformers]
  - name: TRL
    repo: huggingface/trl
    description: Transformer Reinforcement Learning with SFT, DPO, RLHF, and GRPO trainers for alignment and preference tuning (Hugging Face).
    tagline: RLHF, DPO, and GRPO trainers for LLM alignment
    tags: [deep-learning, fine-tuning, huggingface, llm, python, pytorch, reinforcement-learning, rlhf, transformers]
  - name: LitGPT
    repo: Lightning-AI/litgpt
    description: Recipes for pretraining, fine-tuning, and deploying 20+ LLM architectures on your own data (Lightning AI).
    tagline: Pretrain, fine-tune, and deploy 20+ LLM architectures
    tags: [ai, artificial-intelligence, deep-learning, large-language-models, llm, llm-inference, llms]
  - name: Axolotl
    repo: axolotl-ai-cloud/axolotl
    description: Production-grade fine-tuning with multi-GPU support, sequence parallelism, and multimodal capabilities.
    tagline: Production-grade multi-GPU fine-tuning framework
    tags: [fine-tuning, llm]
  - name: LMFlow
    repo: OptimalScale/LMFlow
    description: Extensible toolkit for fine-tuning and inference of large foundation models, NAACL 2024 Best Demo Award.
    tagline: Extensible fine-tuning toolkit, NAACL 2024 award
    tags: [chatgpt, deep-learning, instruction-following, language-model, pretrained-models, pytorch, transformer]
  - name: torchtune
    repo: meta-pytorch/torchtune
    description: Native PyTorch library for fine-tuning LLMs with composable building blocks and YAML configs (Meta).
    tagline: Native PyTorch LLM fine-tuning with YAML configs
    tags: [deep-learning, fine-tuning, llm, meta, post-training, python, pytorch]
  - name: Hugging Face AutoTrain
    repo: huggingface/autotrain-advanced
    description: No-code training for LLMs, vision-language models, text classification, and tabular data (Hugging Face).
    tagline: No-code LLM and vision-language model training
    tags: [autotrain, deep-learning, huggingface, machine-learning, natural-language-processing, natural-language-understanding, python]
  - name: LoRAX
    repo: predibase/lorax
