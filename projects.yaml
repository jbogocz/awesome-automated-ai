- name: Papers and Surveys
  description: Foundational surveys and recent papers on AutoML methods, agentic ML, and benchmarking.
  entries:
  - name: "AutoML: A Survey of the State-of-the-Art (2021)"
    url: https://arxiv.org/abs/1908.00709
    description: Comprehensive survey covering the full AutoML pipeline including data preparation, feature engineering, HPO, and NAS with benchmark comparisons.
    tagline: Comprehensive survey of the full AutoML pipeline
    authors: "He, X., Zhao, K., Chu, X."
    venue: Knowledge-Based Systems
    year: 2021
  - name: "Neural Architecture Search with Reinforcement Learning (2017)"
    url: https://arxiv.org/abs/1611.01578
    description: Seminal paper introducing NAS using an RNN controller trained with reinforcement learning to generate competitive architectures on CIFAR-10.
    tagline: Seminal RL-based NAS paper that launched the field
    authors: "Zoph, B., Le, Q. V."
    venue: ICLR 2017
    year: 2017
  - name: "Neural Architecture Search: A Survey (2019)"
    url: https://arxiv.org/abs/1808.05377
    description: Canonical NAS survey categorizing methods along three dimensions - search space, search strategy, and performance estimation strategy.
    tagline: Canonical NAS survey with three-dimension taxonomy
    authors: "Elsken, T., Metzen, J. H., Hutter, F."
    venue: JMLR
    year: 2019
  - name: "A Comprehensive Survey of Neural Architecture Search: Challenges and Solutions (2021)"
    url: https://arxiv.org/abs/2006.02903
    description: Survey reviewing NAS methods from earliest algorithms through modern gradient-based approaches with comparative analysis across datasets.
    tagline: NAS survey across early RL to modern gradient methods
    authors: "Ren, P., Xiao, Y., Chang, X. et al."
    venue: ACM Computing Surveys
    year: 2021
  - name: "Efficient Automation of Neural Network Design: A Survey on Differentiable NAS (2024)"
    url: https://arxiv.org/abs/2304.05405
    description: Survey of differentiable NAS methods building on DARTS, proposing a challenge-based taxonomy for classifying DNAS techniques.
    tagline: Differentiable NAS survey with challenge-based taxonomy
    authors: "Heuillet, A., Nasser, A., Arioui, H. et al."
    venue: ACM Computing Surveys
    year: 2024
  - name: "On Hyperparameter Optimization of Machine Learning Algorithms (2020)"
    url: https://arxiv.org/abs/2007.15745
    description: Survey of state-of-the-art HPO techniques, libraries, and benchmark experiments comparing Bayesian, evolutionary, and bandit-based methods.
    tagline: HPO survey covering theory, libraries, and benchmarks
    authors: "Yang, L., Shami, A."
    venue: Neurocomputing
    year: 2020
  - name: "Hyperparameter Optimization: Foundations, Algorithms, Best Practices (2023)"
    url: https://arxiv.org/abs/2107.05847
    description: In-depth review of HPO foundations including Bayesian optimization, Hyperband, racing, and practical guidance on integrating HPO with ML pipelines.
    tagline: HPO foundations, best practices, and open challenges
    authors: "Bischl, B., Binder, M., Lang, M. et al."
    venue: WIREs DMKD
    year: 2023
  - name: "Benchmark and Survey of Automated Machine Learning Frameworks (2021)"
    url: https://arxiv.org/abs/1904.12054
    description: Combined survey and benchmark of AutoML techniques across the full ML pipeline evaluated on 137 datasets from established suites.
    tagline: Combined AutoML survey and benchmark on 137 datasets
    authors: "Zoller, M.-A., Huber, M. F."
    venue: JAIR
    year: 2021
  - name: "AMLB: an AutoML Benchmark (2024)"
    url: https://arxiv.org/abs/2207.12560
    description: Open benchmark comparing 9 AutoML frameworks across 104 classification and regression tasks with multi-faceted accuracy and runtime analysis.
    tagline: Open benchmark of 9 AutoML frameworks on 104 tasks
    authors: "Gijsbers, P., Bueno, M. L. P., Coors, S. et al."
    venue: JMLR
    year: 2024
  - name: "Meta-Learning in Neural Networks: A Survey (2021)"
    url: https://arxiv.org/abs/2004.05439
    description: Comprehensive meta-learning survey with a new taxonomy, relationships to transfer learning and HPO, and applications to few-shot learning.
    tagline: Meta-learning survey with taxonomy and applications
    authors: "Hospedales, T., Antoniou, A., Micaelli, P. et al."
    venue: IEEE TPAMI
    year: 2021
  - name: "Deep Neural Networks and Tabular Data: A Survey (2022)"
    url: https://arxiv.org/abs/2110.01889
    description: Survey of deep learning for tabular data categorizing data transformations, specialized architectures, and regularization approaches with empirical comparisons.
    tagline: Deep learning for tabular data survey and benchmarks
    authors: "Borisov, V., Leemann, T., Sesler, K. et al."
    venue: IEEE TNNLS
    year: 2022
  - name: "AutoGluon-Tabular: Robust and Accurate AutoML for Structured Data (2020)"
    url: https://arxiv.org/abs/2003.06505
    description: Technical paper introducing multi-layer stacking ensembles for tabular AutoML that outperformed TPOT, H2O, and AutoWEKA across 50 benchmarks.
    tagline: Multi-layer stacking ensembles for tabular AutoML
    authors: "Erickson, N., Mueller, J., Shirkov, A. et al."
    venue: AutoML Workshop ICML 2020
    year: 2020
  - name: "TabPFN: A Transformer That Solves Small Tabular Classification Problems in a Second (2023)"
    url: https://arxiv.org/abs/2207.01848
    description: In-context-learning transformer for tabular classification matching AutoML systems on small datasets with up to 5700x GPU speedups.
    tagline: In-context transformer for small tabular classification
    authors: "Hollmann, N., Muller, S., Eggensperger, K. et al."
    venue: ICLR 2023
    year: 2023
  - name: "AutoGluon-TimeSeries: AutoML for Probabilistic Time Series Forecasting (2023)"
    url: https://arxiv.org/abs/2308.05566
    description: Open-source AutoML library for probabilistic time-series forecasting combining statistical, ML, and deep learning models via ensembling on 29 benchmarks.
    tagline: AutoML for probabilistic time series forecasting
    authors: "Shchur, O., Turkmen, C., Erickson, N. et al."
    venue: AutoML Conference 2023
    year: 2023
  - name: "Chronos: Learning the Language of Time Series (2024)"
    url: https://arxiv.org/abs/2403.07815
    description: Pretrained probabilistic time-series foundation models tokenizing values for T5-based transformers achieving strong zero-shot forecasting across 42 datasets.
    tagline: Pretrained foundation models for time series
    authors: "Ansari, A. F., Stella, L., Turkmen, C. et al."
    venue: TMLR
    year: 2024
  - name: "On the Opportunities and Risks of Foundation Models (2021)"
    url: https://arxiv.org/abs/2108.07258
    description: Stanford CRFM report defining foundation models and analyzing their capabilities, technical principles, applications, and societal impact.
    tagline: Foundational report defining foundation models
    authors: "Bommasani, R., Hudson, D. A., Adeli, E. et al."
    venue: Stanford CRFM Report
    year: 2021
  - name: "Parameter-Efficient Fine-Tuning for Large Models: A Comprehensive Survey (2024)"
    url: https://arxiv.org/abs/2403.14608
    description: Survey of PEFT methods for LLMs and vision models covering algorithms, computational overhead, applications, and real-world system design.
    tagline: Comprehensive PEFT survey for large models
    authors: "Han, Z., Gao, C., Liu, J. et al."
    venue: arXiv preprint
    year: 2024
  - name: "The Rise and Potential of Large Language Model Based Agents: A Survey (2025)"
    url: https://arxiv.org/abs/2309.07864
    description: Comprehensive survey on LLM-based agents presenting a brain-perception-action framework with applications across single-agent, multi-agent, and agent societies.
    tagline: LLM agents survey with brain-perception-action framework
    authors: "Xi, Z., Chen, W., Guo, X. et al."
    venue: Science China Info Sciences
    year: 2025
  - name: "A Survey on Large Language Model based Autonomous Agents (2024)"
    url: https://arxiv.org/abs/2308.11432
    description: Unified framework survey on LLM-based autonomous agents across social science, natural science, and engineering with evaluation strategies.
    tagline: Unified framework survey on LLM autonomous agents
    authors: "Wang, L., Ma, C., Feng, X. et al."
    venue: Frontiers of Computer Science
    year: 2024
  - name: "AutoML-Agent: A Multi-Agent LLM Framework for Full-Pipeline AutoML (2025)"
    url: https://arxiv.org/abs/2410.02958
    description: Multi-agent LLM framework spanning data retrieval to deployment using retrieval-augmented planning, parallel specialized agents, and multi-stage verification.
    tagline: Multi-agent LLM framework for full-pipeline AutoML
    authors: "Trirat, P., Jeong, W., Hwang, S. J."
    venue: ICLR 2025
    year: 2025
  - name: "MLAgentBench: Evaluating Language Agents on Machine Learning Experimentation (2024)"
    url: https://arxiv.org/abs/2310.03302
    description: Benchmark of 13 ML tasks evaluating LLM-driven agents across file I/O, code execution, and iterative ReAct-style experimentation.
    tagline: Benchmark of 13 ML tasks evaluating LLM agents
    authors: "Huang, Q., Vora, J., Liang, P. et al."
    venue: ICML 2024
    year: 2024
  - name: "Data-centric Artificial Intelligence: A Survey (2025)"
    url: https://arxiv.org/abs/2303.10158
    description: Survey of data-centric AI covering training data development, inference data development, and data maintenance with automation and collaboration views.
    tagline: Survey of data-centric AI across the data lifecycle
    authors: "Zha, D., Bhat, Z. P., Lai, K.-H. et al."
    venue: ACM Computing Surveys
    year: 2025
