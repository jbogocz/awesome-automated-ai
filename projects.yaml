- name: Foundation Models as AutoML
  description: Pretrained models that replace traditional pipeline-search AutoML with a single forward pass or zero-shot inference.
  entries:
  - name: TimesFM
    repo: google-research/timesfm
    description: Time-series foundation model for zero-shot forecasting across domains without task-specific training (Google).
    tagline: Zero-shot time-series forecasting foundation model
  - name: TabPFN
    repo: PriorLabs/TabPFN
    description: Tabular foundation model that matches tuned XGBoost in 2.8 seconds with a single forward pass - 100% win rate vs default XGBoost on datasets under 10K rows (Nature 2024, now v2.6 supporting
      up to 100K rows).
    tagline: Beats tuned XGBoost in 2.8 seconds flat
    tags: [data-science, foundation-models, machine-learning, tabpfn, tabular-data]
  - name: Chronos
    repo: amazon-science/chronos-forecasting
    description: Pretrained time-series foundation model for zero-shot probabilistic forecasting on unseen data (Amazon).
    tagline: Pretrained probabilistic forecasting on unseen time-series
    tags: [artificial-intelligence, forecasting, foundation-models, huggingface, huggingface-transformers, large-language-models, llm, machine-learning, pretrained-models, time-series, time-series-forecasting, timeseries, transformers]
  - name: Moirai
    repo: SalesforceAIResearch/uni2ts
    description: Universal time-series forecasting transformer supporting multivariate forecasting unlike most competitors. Moirai-MoE released Oct 2024 (Salesforce).
    tagline: Universal multivariate time-series forecasting transformer
    tags: [deep-learning, forecasting, machine-learning, pre-trained-models, pre-training, representation-learning, time-series, time-series-forecasting, transformers, universal-forecasting]
  - name: TabM
    repo: yandex-research/tabm
    description: Parameter-efficient ensemble of MLPs based on BatchEnsemble, achieving top performance among tabular deep learning models without attention complexity (ICLR 2025, Yandex).
    tagline: Efficient MLP ensemble for top tabular performance
  - name: TALENT
    repo: LAMDA-Tabular/TALENT
    description: Comprehensive toolkit and benchmark for tabular learning covering 35+ deep methods across 300 datasets.
    tagline: Benchmark toolkit for 35+ tabular deep methods
    tags: [tabular, tabular-data, tabular-data-benchmark, tabular-data-deep-learning, tabular-data-machine-learning, tabular-data-toolkit, tabular-methods]
  - name: TabICL
    repo: soda-inria/tabicl
    description: State-of-the-art tabular foundation model achieving 10x faster inference than TabPFN v2.5 (ICML 2025).
    tagline: Tabular foundation model 10x faster than TabPFN
    tags: [deep-learning, foundation-models, machine-learning, tabular-data, tabular-methods, tabular-model]
  - name: CARTE
    repo: soda-inria/carte
    description: Context-aware tabular representation using pretrained language models for data with heterogeneous columns.
    tagline: LLM-powered representation for heterogeneous tabular data
    tags: [classification, data-science, graph-transformer, machine-learning, regression, transformers]
