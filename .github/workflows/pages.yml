name: Deploy Pages

# Manual/backup deploy path only. The weekly pipeline deploys Pages itself
# (see weekly-regenerate.yml); this workflow exists for out-of-band redeploys.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Ref to deploy (default: workflow's own ref)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag != '' && inputs.tag || github.sha }}

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - id: deployment
        uses: actions/deploy-pages@v5
