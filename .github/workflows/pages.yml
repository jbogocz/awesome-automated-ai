name: Deploy Pages

# Manual/backup deploy path. The weekly pipeline deploys Pages itself
# (see weekly-regenerate.yml) because releases it creates with GITHUB_TOKEN
# never fire the `release` trigger here — GitHub blocks workflow chaining
# off GITHUB_TOKEN events. The release trigger below still works for
# releases published by a human. Default checkout uses github.sha, which
# for a release event is the tagged commit — no need for github.event.*.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (default: workflow's own ref)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag != '' && inputs.tag || github.sha }}

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./docs

      - id: deployment
        uses: actions/deploy-pages@v5
