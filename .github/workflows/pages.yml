name: Deploy Pages

# Pages goes live ONLY when a release is published. Pushes to main no longer
# update the site — work lands on main freely; releases are the cut point.
# Default checkout uses github.sha, which for a release event is the tagged
# commit — no need to reference github.event.* (and no injection surface).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (default: workflow's own ref)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag != '' && inputs.tag || github.sha }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - id: deployment
        uses: actions/deploy-pages@v4
